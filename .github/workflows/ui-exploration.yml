# ---------------------------------------------------------------------------
# UI-Exploration (CVM-60, Iteration 23C)
#
# Startet den gesamten Stack (Postgres, Keycloak, Backend, Frontend),
# laedt das Keycloak-Realm mit den Test-Usern, installiert Playwright
# + Chromium und fuehrt das diagnostische Skript aus. Report und
# Screenshots werden als Artefakt 30 Tage aufbewahrt.
#
# Ausgeloest bei Pull-Requests, die Frontend- oder Controller-Pfade
# beruehren.
# ---------------------------------------------------------------------------
name: UI-Exploration

on:
  pull_request:
    paths:
      - 'cvm-frontend/**'
      - 'cvm-api/**'
      - 'cvm-application/**'
      - 'scripts/explore-ui/**'
      - 'infra/keycloak/**'
      - '.github/workflows/ui-exploration.yml'
  workflow_dispatch:

jobs:
  explore:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: cvm
          POSTGRES_PASSWORD: cvm
          POSTGRES_DB: cvm
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U cvm -d cvm"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=15

      keycloak:
        image: quay.io/keycloak/keycloak:24.0
        env:
          KEYCLOAK_ADMIN: admin
          KEYCLOAK_ADMIN_PASSWORD: admin
          KC_HEALTH_ENABLED: 'true'
        ports:
          - 8080:8080
        options: >-
          --health-cmd="curl -fsS http://localhost:8080/health/ready || exit 1"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=30

    env:
      CVM_TEST_ADMIN_PASS: admin
      CVM_SERVER_PORT: 8081

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: |
            cvm-frontend/package-lock.json

      - name: Import Keycloak-Realm
        # Keycloak-Service startet ohne --import-realm. Realm wird per
        # API eingespielt, bevor das Frontend Login-Redirects macht.
        run: |
          set -euo pipefail
          echo "Warte auf Keycloak-Ready..."
          for i in $(seq 1 60); do
            if curl -fsS http://localhost:8080/health/ready >/dev/null 2>&1; then
              echo "Keycloak ready."
              break
            fi
            sleep 2
          done
          TOKEN=$(curl -fsS -X POST \
            -d "grant_type=password" \
            -d "client_id=admin-cli" \
            -d "username=admin" \
            -d "password=admin" \
            http://localhost:8080/realms/master/protocol/openid-connect/token \
            | jq -r .access_token)
          curl -fsS -X POST \
            -H "Authorization: Bearer $TOKEN" \
            -H "Content-Type: application/json" \
            -d @infra/keycloak/dev-realm.json \
            http://localhost:8080/admin/realms
          echo "Realm cvm-local importiert."

      - name: Build Backend
        run: ./mvnw -T 1C -DskipTests package

      - name: Start Backend
        run: |
          nohup java -jar cvm-app/target/cvm-app-*.jar \
            --spring.datasource.url=jdbc:postgresql://localhost:5432/cvm \
            --spring.datasource.username=cvm \
            --spring.datasource.password=cvm \
            > backend.log 2>&1 &
          echo $! > backend.pid
          echo "Warte auf /actuator/health..."
          for i in $(seq 1 90); do
            if curl -fsS http://localhost:8081/actuator/health | grep -q '"status":"UP"'; then
              echo "Backend up."
              break
            fi
            sleep 2
          done

      - name: Install Frontend-Dependencies
        working-directory: cvm-frontend
        run: npm ci

      - name: Build Frontend
        working-directory: cvm-frontend
        run: npm run build -- --configuration=development

      - name: Serve Frontend
        working-directory: cvm-frontend
        run: |
          nohup npx http-server dist/cvm-frontend/browser \
            -p 4200 --proxy http://localhost:4200? \
            > ../frontend.log 2>&1 &
          echo $! > ../frontend.pid
          for i in $(seq 1 30); do
            if curl -fsS http://localhost:4200 >/dev/null; then
              echo "Frontend up."
              break
            fi
            sleep 2
          done

      - name: Install explore-ui-Paket
        working-directory: scripts/explore-ui
        run: |
          npm ci --no-audit --no-fund || npm install --no-audit --no-fund

      - name: Install Playwright-Browser
        working-directory: scripts/explore-ui
        run: npx playwright install --with-deps chromium

      - name: UI-Exploration ausfuehren
        working-directory: scripts/explore-ui
        run: npm run explore -- --target=ci
        env:
          CVM_TEST_ADMIN_PASS: admin

      - name: Artefakte hochladen
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ui-exploration-${{ github.run_number }}
          path: |
            docs/**/ui-exploration-report.md
            docs/**/ui-exploration.json
            docs/**/ui-exploration/screenshots/*.png
            backend.log
            frontend.log
          retention-days: 30
