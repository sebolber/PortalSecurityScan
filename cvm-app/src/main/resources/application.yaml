spring:
  application:
    name: cvm
  servlet:
    multipart:
      max-file-size: 30MB
      max-request-size: 35MB
  datasource:
    url: ${CVM_DB_URL:jdbc:postgresql://localhost:5432/cvm}
    username: ${CVM_DB_USER:cvm}
    password: ${CVM_DB_PASSWORD:cvm}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
        dialect: org.hibernate.dialect.PostgreSQLDialect
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${CVM_OIDC_ISSUER:http://localhost:8080/realms/cvm-local}
  mail:
    host: ${CVM_SMTP_HOST:localhost}
    port: ${CVM_SMTP_PORT:1025}
    username: ${CVM_SMTP_USER:}
    password: ${CVM_SMTP_PASSWORD:}

# ---------------------------------------------------------------------------
# CVM-Konfiguration
#
# Iteration 61 (CVM-62): Fachliche Parameter werden ueber den System-
# Parameter-Dialog (`/admin/parameters`) verwaltet und sind NICHT mehr in
# dieser Datei dupliziert - sonst weiss niemand, welcher Wert greift.
# Die hier verbliebenen Schluessel sind bewusst NICHT migriert, weil sie
# entweder zum Boot-Zeitpunkt feststehen muessen (Security-Filter,
# Endpoint-URLs) oder vom Deployment-Template stammen.
# ---------------------------------------------------------------------------
cvm:
  security:
    cors:
      # CORS wird waehrend des SecurityFilterChain-Builds gelesen; ein
      # Runtime-Override wuerde den Filter neu aufbauen muessen.
      allowed-origins: ${CVM_CORS_ALLOWED_ORIGINS:http://localhost:4200}
  enrichment:
    osv:
      # Die Base-URL bleibt bewusst ausserhalb des Parameter-Stores
      # (steht in CLAUDE.md unter "nicht migrieren"). Feature-Flag und
      # Batch-Parameter werden ueber den Parameter-Dialog geschaltet.
      base-url: ${CVM_OSV_BASE_URL:https://api.osv.dev}

server:
  port: ${CVM_SERVER_PORT:8081}
  error:
    include-message: always
    include-binding-errors: always

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      probes:
        enabled: true
      show-details: when-authorized
  info:
    java:
      enabled: true
    env:
      enabled: true

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

info:
  application:
    name: CVE-Relevance-Manager
    description: Relevanzbewertung von CVEs gegen Produkte und Umgebungen
    version: 0.0.1-SNAPSHOT

logging:
  level:
    org.hibernate.engine.jdbc.batch.internal: DEBUG
    org.hibernate.engine.jdbc.spi.SqlExceptionHelper: DEBUG
    org.springframework.transaction.interceptor: TRACE
    org.springframework.transaction.event: DEBUG
