spring:
  application:
    name: cvm
  datasource:
    url: ${CVM_DB_URL:jdbc:postgresql://localhost:5432/cvm}
    username: ${CVM_DB_USER:cvm}
    password: ${CVM_DB_PASSWORD:cvm}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
        dialect: org.hibernate.dialect.PostgreSQLDialect
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${CVM_OIDC_ISSUER:http://localhost:8080/realms/cvm-local}
  mail:
    host: ${CVM_SMTP_HOST:localhost}
    port: ${CVM_SMTP_PORT:1025}
    username: ${CVM_SMTP_USER:}
    password: ${CVM_SMTP_PASSWORD:}

server:
  port: ${CVM_SERVER_PORT:8081}
  error:
    include-message: always
    include-binding-errors: always

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      probes:
        enabled: true
      show-details: when-authorized
  info:
    java:
      enabled: true
    env:
      enabled: true

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

info:
  application:
    name: CVE-Relevance-Manager
    description: Relevanzbewertung von CVEs gegen Produkte und Umgebungen
    version: 0.0.1-SNAPSHOT
