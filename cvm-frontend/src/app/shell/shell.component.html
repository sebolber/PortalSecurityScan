<cvm-alert-banner></cvm-alert-banner>
<mat-toolbar color="primary" class="cvm-header">
  <button mat-icon-button aria-label="CVM" routerLink="/dashboard">
    <mat-icon>shield</mat-icon>
  </button>
  <span class="cvm-title">{{ texte.app.title }}</span>

  <mat-form-field appearance="outline" class="cvm-product" subscriptSizing="dynamic">
    <mat-label>{{ texte.shell.productSelector }}</mat-label>
    <mat-select [(ngModel)]="selectedProduct">
      @for (p of produkte; track p.key) {
        <mat-option [value]="p.key">{{ p.label }}</mat-option>
      }
    </mat-select>
  </mat-form-field>

  <span class="flex-1"></span>

  @if (loggedIn()) {
    <button mat-button [matMenuTriggerFor]="userMenu">
      <mat-icon>account_circle</mat-icon>
      <span>{{ username() || 'Benutzer' }}</span>
      <mat-icon>arrow_drop_down</mat-icon>
    </button>
    <mat-menu #userMenu="matMenu">
      <button mat-menu-item (click)="logout()">
        <mat-icon>logout</mat-icon>
        <span>{{ texte.app.logout }}</span>
      </button>
    </mat-menu>
  } @else {
    <button mat-button (click)="login()">
      <mat-icon>login</mat-icon>
      <span>{{ texte.app.login }}</span>
    </button>
  }
</mat-toolbar>

<mat-sidenav-container class="cvm-container">
  <mat-sidenav mode="side" opened>
    <mat-nav-list>
      @for (entry of menuEintraege(); track entry.id) {
        <a
          mat-list-item
          [routerLink]="entry.path"
          routerLinkActive="active"
        >
          <mat-icon matListItemIcon>{{ entry.icon }}</mat-icon>
          <span matListItemTitle>{{ entry.label }}</span>
        </a>
      } @empty {
        <p class="cvm-no-menu">{{ texte.app.notLoggedIn }}</p>
      }
    </mat-nav-list>
  </mat-sidenav>

  <mat-sidenav-content class="cvm-content">
    <router-outlet></router-outlet>
  </mat-sidenav-content>
</mat-sidenav-container>
