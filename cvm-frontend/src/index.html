  <!-- Iteration 32 (CVM-73), UI-Fix HIGH-1: Material-Icons-Font und Fira Sans
       werden sonst nicht geladen. Admins sehen dann nur die ersten Zeichen
       des Ligatur-Namens ("da", "cl", ...) statt der Icons. Mandanten-Branding
       (ThemeService) kann font_family_href ueberschreiben, das ist weiter
       weg hinter <cvm-root> geregelt. Fuer offline/air-gapped Installationen
       ist ein self-hosted Asset-Paket als naechster Schritt vorgesehen. -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet"
        href="https://fonts.googleapis.com/icon?family=Material+Icons">
  <link rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Fira+Sans:wght@400;500;700&amp;display=swap">
